<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1 id="title">圍棋（人機對戰）</h1>
        <p id="subtitle">黑棋先手（你），白棋後手（AI）</p>
      </header>

      <section class="controls">
        <label id="difficulty-label" for="difficulty">難度</label>
        <select id="difficulty">
          <option value="easy">簡單</option>
          <option value="medium" selected>中等</option>
          <option value="hard">困難</option>
        </select>
        <label id="language-label" for="language">語言</label>
        <select id="language">
          <option value="zh-Hant" selected>繁體中文</option>
          <option value="en">English</option>
        </select>
        <button id="new-game" type="button">新遊戲</button>
        <button id="pass-btn" type="button">停一手</button>
        <button id="undo-btn" type="button">悔棋</button>
      </section>

      <section class="status-panel">
        <p id="status">你的回合</p>
        <p id="captures">提子：黑 0 / 白 0</p>
      </section>

      <section class="board-wrap">
        <canvas id="board" width="760" height="760" aria-label="圍棋棋盤"></canvas>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
